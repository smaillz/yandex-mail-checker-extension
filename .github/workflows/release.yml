name: Release

# Build the extension zip and attach it to a GitHub Release whenever a
# version tag (e.g. v1.0.0) is pushed.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build extension zip
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
